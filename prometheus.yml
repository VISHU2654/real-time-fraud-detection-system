# =============================================================================
# Prometheus Configuration — Real-Time Fraud Detection System
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # API Server metrics
  - job_name: 'api-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-server:4000']
        labels:
          service: 'api-server'

  # Kafka Consumer metrics
  - job_name: 'kafka-consumer'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kafka-consumer:4001']
        labels:
          service: 'kafka-consumer'
