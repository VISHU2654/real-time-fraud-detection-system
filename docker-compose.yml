
services:
  # 1. React Frontend (Served by Nginx)
  analyst-console:
    build: ./analyst-console
    container_name: analyst-console
    ports:
      - "3000:80"
    networks:
      - fraud_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # 2. Node.js API Server
  api-server:
    build: ./api-server
    container_name: api-server
    ports:
      - "4000:4000"
    networks:
      - fraud_network
    depends_on:
      kafka:
        condition: service_healthy

      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 3. Kafka Consumer Service
  kafka-consumer:
    build: ./kafka-consumer
    container_name: kafka-consumer
    networks:
      - fraud_network
    depends_on:
      kafka:
        condition: service_healthy

      redis:
        condition: service_healthy
    volumes:
      - ./models:/usr/src/app/models
    ports:
      - "4001:4001"
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 4. Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks:
      - fraud_network
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s



  # 6. Zookeeper (Required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    networks:
      - fraud_network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # 7. Kafka (Event Broker)
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    networks:
      - fraud_network
    ports:
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # 8. Prometheus (Metrics Scraper)
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - fraud_network
    depends_on:
      - kafka-consumer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # 9. Grafana (Metrics Dashboard)
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - fraud_network
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

networks:
  fraud_network:
    driver: bridge

volumes:
  redis_data:
    driver: local